<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}product recommendation system{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    {% include 'components/header_admin.html' %}
    <main class="max-w-7xl mx-auto px-6 py-6">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div id="flash-message" class="mb-4 flex items-center justify-between rounded-lg px-4 py-3
                                {% if category == 'success' %}
                                    bg-green-100 text-green-800
                                {% else %}
                                    bg-red-100 text-red-800
                                {% endif %}
                                ">
                    <span>{{ message }}</span>
                    <button onclick="this.parentElement.remove()" class="font-bold ml-4">✕</button>
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}
        {% endblock %}

    </main>
</body>
</html>
