{% extends 'base.html' %}

{% block title %}Login — MyShop{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow px-6 py-8">
    <h2 class="text-2xl font-semibold text-slate-800 mb-4">Welcome back</h2>
    <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-700">Email</label>
            <input name="email" type="email" required class="mt-1 block w-full rounded-md border-slate-200 shadow-sm focus:border-accent focus:ring-accent/40" placeholder="name@example.com">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Password</label>
            <input name="password" type="password" required class="mt-1 block w-full rounded-md border-slate-200 shadow-sm focus:border-accent focus:ring-accent/40" placeholder="••••••">
        </div>

        <div class="flex items-center justify-between">
            <div class="text-sm text-slate-600">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary font-medium">Register</a></div>
            <button type="submit" class="inline-flex items-center px-4 py-2 bg-primary text-white rounded-md hover:bg-teal-600">Sign in</button>
        </div>
    </form>
</div>
{% endblock %}
