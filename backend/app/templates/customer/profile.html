{% extends 'base.html' %}

{% block title %}Profile | Cartify{% endblock %}

{% block content %}
<div class="profile-card profile-shell">
  <div class="profile-top">
    <div class="profile-avatar">AV</div>
    <div class="profile-info">
      <div class="name">{{ user.name }}</div>
      <div class="meta">{{ user.email }} • {{ user.country }}</div>
    </div>
    <div class="profile-actions">
      <a class="btn-back" href="{{ url_for('customer_rt.dashboard') }}">Back</a>
    </div>
  </div>

  <form method="post">
    <div class="profile-grid">
      <div class="form-field">
        <label class="section-title">Name</label>
        <input name="name" class="mt-1 block w-full rounded-md border-slate-200 px-3 py-2" value="{{ user.name }}">
      </div>

      <div class="form-field">
        <label class="section-title">Email (readonly)</label>
        <input class="mt-1 block w-full rounded-md border-slate-200" value="{{ user.email }}" readonly>
      </div>

      <div class="form-field">
        <label class="section-title">Age</label>
        <input name="age" class="mt-1 block w-full rounded-md border-slate-200" value="{{ user.age }}">
      </div>

      <div class="form-field">
        <label class="section-title">Gender</label>
        <select name="gender" class="mt-1 block w-full rounded-md border-slate-200">
          <option value="male" {% if user.gender=='male' %}selected{% endif %}>Male</option>
          <option value="female" {% if user.gender=='female' %}selected{% endif %}>Female</option>
          <option value="other" {% if user.gender=='other' %}selected{% endif %}>Other</option>
        </select>
      </div>

      <div class="form-field">
        <label class="section-title">Country</label>
        <input name="country" class="mt-1 block w-full rounded-md border-slate-200" value="{{ user.country }}">
      </div>
    </div>

    <div class="password-shell">
      <div class="section-title">Change password</div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-field">
          <label class="helper">New password</label>
          <input name="password" type="password" class="mt-1 block w-full rounded-md border-slate-200">
        </div>
        <div class="form-field">
          <label class="helper">Confirm password</label>
          <input name="confirm_password" type="password" class="mt-1 block w-full rounded-md border-slate-200">
        </div>
      </div>
    </div>

    <div class="btn-save-row">
      <button class="btn-save">Save changes</button>
      <a class="btn-back" href="{{ url_for('customer_rt.dashboard') }}">Back</a>
    </div>
  </form>
</div>
{% endblock %}
