{% extends 'base.html' %}

{% block title %}Profile — MyShop{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white rounded-lg shadow px-6 py-8">
  <h2 class="text-xl font-semibold mb-4">Profile</h2>
  <form method="post" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700">Name</label>
      <input name="name" class="mt-1 block w-full rounded-md border-slate-200" value="{{ user.name }}">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="md:col-span-2">
        <label class="block text-sm font-medium text-slate-700">Email (readonly)</label>
        <input class="mt-1 block w-full rounded-md border-slate-200" value="{{ user.email }}" readonly>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Age</label>
        <input name="age" class="mt-1 block w-full rounded-md border-slate-200" value="{{ user.age }}">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Gender</label>
        <select name="gender" class="mt-1 block w-full rounded-md border-slate-200">
          <option value="male" {% if user.gender=='male' %}selected{% endif %}>Male</option>
          <option value="female" {% if user.gender=='female' %}selected{% endif %}>Female</option>
          <option value="other" {% if user.gender=='other' %}selected{% endif %}>Other</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700">Country</label>
      <input name="country" class="mt-1 block w-full rounded-md border-slate-200" value="{{ user.country }}">
    </div>

    <hr class="my-4">
    <h4 class="text-lg font-medium">Change password</h4>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-slate-700">New password</label>
        <input name="password" type="password" class="mt-1 block w-full rounded-md border-slate-200">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Confirm password</label>
        <input name="confirm_password" type="password" class="mt-1 block w-full rounded-md border-slate-200">
      </div>
    </div>

    <div class="flex items-center gap-3">
      <button class="px-4 py-2 bg-primary text-white rounded-md">Save changes</button>
      <a class="text-slate-600" href="{{ url_for('customer_rt.dashboard') }}">Back</a>
    </div>
  </form>
</div>
{% endblock %}
