<header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

        <a href="{{ url_for('admin_rt.dashboard') }}"
           class="text-xl font-semibold text-primary">
            MyShop Admin
        </a>

        <nav class="flex items-center gap-6">

            <a href="{{ url_for('admin_rt.dashboard') }}"
               class="text-slate-600 hover:text-primary">
                Dashboard
            </a>

            <a href="{{ url_for('admin_rt.manage_orders') }}"
               class="text-slate-600 hover:text-primary">
                Manage Orders
            </a>

            <a href="#"
               class="text-slate-600 hover:text-primary">
                Sales Statistics
            </a>

            <a href="{{ url_for('admin_rt.profile') }}"
               class="text-slate-600 hover:text-primary">
                Profile
            </a>

        </nav>

        <form action="{{ url_for('admin_rt.dashboard') }}" method="GET">
            <input
                type="text"
                name="keyword"
                value="{{ request.args.get('keyword', '') }}"
                placeholder="Search product..."
                class="border rounded-lg px-3 py-2 w-64">
        </form>

    </div>
</header>
