{% extends 'layouts/admin_base.html' %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white rounded-lg shadow px-6 py-8">

    <h2 class="text-xl font-semibold mb-6">Admin Profile</h2>

    <form method="POST" class="space-y-4">

        <div>
            <label class="block text-sm font-medium text-slate-700">
                Name
            </label>
            <input
                type="text"
                name="name"
                value="{{ admin.name }}"
                class="mt-1 block w-full rounded-md border border-slate-200 px-3 py-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">
                Email
            </label>
            <input
                type="email"
                value="{{ admin.email }}"
                readonly
                class="mt-1 block w-full rounded-md border border-slate-200 px-3 py-2 bg-slate-100">
        </div>

        <hr class="my-4">

        <h4 class="text-lg font-medium">
            Change Password
        </h4>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <div>
                <label class="block text-sm font-medium text-slate-700">
                    New Password
                </label>
                <input
                    type="password"
                    name="password"
                    class="mt-1 block w-full rounded-md border border-slate-200 px-3 py-2">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700">
                    Confirm Password
                </label>
                <input
                    type="password"
                    name="confirm_password"
                    class="mt-1 block w-full rounded-md border border-slate-200 px-3 py-2">
            </div>

        </div>

        <div class="flex items-center gap-3 pt-2">

            <button
                type="submit"
                class="px-4 py-2 bg-primary text-white rounded-md hover:opacity-90">
                Save Changes
            </button>

            <a
                href="{{ url_for('admin_rt.dashboard') }}"
                class="px-4 py-2 bg-slate-500 text-white rounded-md hover:bg-slate-600">
                Back
            </a>

            <a
                href="{{ url_for('auth.logout') }}"
                class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
                Logout
            </a>

        </div>

    </form>

</div>
{% endblock %}
