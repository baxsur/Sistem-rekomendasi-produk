{% extends "admin/admin_base.html" %}

{% block title %}My Profile{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-800">My Profile</h1>
    <p class="text-slate-500 text-sm mt-1">Manage your account information.</p>
</div>

<div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 max-w-xl">
    <div class="flex items-center gap-4 mb-6">
        <img src="https://ui-avatars.com/api/?name={{ admin.name or admin.email }}&background=0f766e&color=fff&size=128"
            alt="Profile" class="w-16 h-16 rounded-full object-cover border border-slate-200">
        <div>
            <p class="font-semibold text-slate-800 text-lg">{{ admin.name or 'Admin' }}</p>
            <p class="text-sm text-slate-500">{{ admin.email }}</p>
            <p class="text-xs text-slate-400 mt-1">Joined {{ admin.created_at.strftime('%d %b %Y') }}</p>
        </div>
    </div>

    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-600 mb-1">Name</label>
            <input type="text" name="name" value="{{ admin.name or '' }}" required
                class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-600 mb-1">Email</label>
            <input type="email" name="email" value="{{ admin.email }}" required
                class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
        </div>

        <div class="border-t border-slate-200 pt-4 mt-4">
            <p class="text-sm font-semibold text-slate-700 mb-3">Change Password</p>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">New Password</label>
                    <input type="password" name="new_password" placeholder="Leave blank if not changing"
                        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Confirm New Password</label>
                    <input type="password" name="confirm_password" placeholder="Repeat new password"
                        class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent">
                </div>
            </div>
        </div>

        <div class="flex justify-end pt-2">
            <button type="submit" class="px-4 py-2 bg-primary hover:bg-teal-800 text-white rounded-lg text-sm font-medium">
                Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
