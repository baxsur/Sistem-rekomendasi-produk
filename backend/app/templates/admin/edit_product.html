{% extends 'layouts/admin_base.html' %}

{% block title %}
Edit Product
{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto bg-white shadow rounded-xl p-6">
    <h1 class="text-2xl font-bold mb-6">Edit Product</h1>
    <form method="POST" class="space-y-4">

        <div>
            <label class="block mb-1">Product Name</label>
            <input type="text" name="product_name" value="{{ product.product_name }}"
                class="w-full border rounded px-3 py-2" required>
        </div>

        <div>
            <label class="block mb-1">Category</label>
            <select name="category" class="w-full border rounded px-3 py-2" required>
                {% for category in categories %}
                <option value="{{ category }}" {% if category==product.category %} selected {% endif %}>
                    {{ category }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block mb-1">Brand</label>
            <input type="text" name="brand" value="{{ product.brand }}" class="w-full border rounded px-3 py-2">
        </div>

        <div>
            <label class="block mb-1">Price</label>
            <input type="number" step="0.01" name="price" value="{{ product.price }}"
                class="w-full border rounded px-3 py-2" required>
        </div>

        <div>
            <label class="block mb-1">Stock Quantity</label>
            <input type="number" name="stock_quantity" value="{{ product.stock_quantity }}"
                class="w-full border rounded px-3 py-2">
        </div>

        <div>
            <label class="block mb-1">Discount (%)</label>
            <input type="number" step="0.01" name="discount_pct" value="{{ product.discount_pct }}"
                class="w-full border rounded px-3 py-2">
        </div>

        <div class="flex gap-3">
            <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
                Save Changes
            </button>
            <a href="{{ url_for('admin_rt.product_detail', product_id=product.id) }}"
                class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
