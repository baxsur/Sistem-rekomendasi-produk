{% extends 'layouts/admin_base.html' %}

{% block title %}
Add Product
{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto bg-white shadow rounded-lg p-6">
    <h1 class="text-2xl font-bold mb-6">Add Product</h1>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block mb-1 font-medium">Product Name</label>
            <input type="text" name="product_name" class="w-full border rounded px-3 py-2" required>
        </div>

        <!-- <div>
            <label class="block mb-1 font-medium">Category</label>
            <input type="text" name="category" class="w-full border rounded px-3 py-2">
        </div> -->
        <div>
            <label class="block mb-1 font-medium">Category</label>

            <select name="category" class="w-full border rounded px-3 py-2" required>

                <option value="">Select Category</option>

                <option value="Health">Health</option>
                <option value="Beauty">Beauty</option>
                <option value="Office Supplies">Office Supplies</option>
                <option value="Electronics">Electronics</option>
                <option value="Pet Supplies">Pet Supplies</option>
                <option value="Sports">Sports</option>
                <option value="Clothing">Clothing</option>
                <option value="Food & Grocery">Food & Grocery</option>
                <option value="Jewelry">Jewelry</option>
                <option value="Music">Music</option>
                <option value="Automotive">Automotive</option>
                <option value="Books">Books</option>
                <option value="Home & Garden">Home & Garden</option>
                <option value="Toys">Toys</option>
                <option value="Software">Software</option>

            </select>
        </div>

        <div>
            <label class="block mb-1 font-medium">Brand</label>
            <input type="text" name="brand" class="w-full border rounded px-3 py-2">
        </div>

        <div>
            <label class="block mb-1 font-medium">Price</label>
            <input type="number" step="0.01" name="price" class="w-full border rounded px-3 py-2" required>
        </div>

        <div>
            <label class="block mb-1 font-medium">Stock Quantity</label>
            <input type="number" name="stock_quantity" class="w-full border rounded px-3 py-2" value="0">
        </div>

        <div>
            <label class="block mb-1 font-medium">Discount (%)</label>
            <input type="number" step="0.01" name="discount_pct" class="w-full border rounded px-3 py-2" value="0">
        </div>

        <div class="flex gap-3 pt-4">
            <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
                Save Product
            </button>

            <a href="{{ url_for('admin_rt.dashboard') }}"
                class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
