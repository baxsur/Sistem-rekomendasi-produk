<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0f766e',
                        accent: '#06b6d4',
                        surface: '#f8fafc',
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-slate-800 h-screen flex overflow-hidden">

    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col h-full hidden md:flex transition-all duration-300">
        <div class="h-16 flex items-center px-6 bg-slate-950 border-b border-slate-800">
            <div class="text-white font-bold text-xl flex items-center gap-2">
                <i class="fa-solid fa-cube text-accent"></i> AdminPanel
            </div>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4 px-2">Menu Utama</p>
            <nav class="space-y-1">
                <a href="{{ url_for('admin_rt.dashboard') }}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors {% if active_page == 'dashboard' %}bg-primary text-white shadow-md{% else %}hover:bg-slate-800 hover:text-white{% endif %}">
                    <i class="fa-solid fa-chart-pie w-5 text-center"></i>
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('admin_rt.products') }}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors {% if active_page == 'products' %}bg-primary text-white shadow-md{% else %}hover:bg-slate-800 hover:text-white{% endif %}">
                    <i class="fa-solid fa-box w-5 text-center"></i>
                    <span>Manajemen Produk</span>
                </a>
                <a href="{{ url_for('admin_rt.stock') }}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors {% if active_page == 'stock' %}bg-primary text-white shadow-md{% else %}hover:bg-slate-800 hover:text-white{% endif %}">
                    <i class="fa-solid fa-layer-group w-5 text-center"></i>
                    <span>Manajemen Stok</span>
                </a>
                <a href="{{ url_for('admin_rt.orders') }}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors {% if active_page == 'orders' %}bg-primary text-white shadow-md{% else %}hover:bg-slate-800 hover:text-white{% endif %}">
                    <i class="fa-solid fa-cart-shopping w-5 text-center"></i>
                    <span>Pesanan</span>
                </a>
                <a href="{{ url_for('admin_rt.reviews') }}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors {% if active_page == 'reviews' %}bg-primary text-white shadow-md{% else %}hover:bg-slate-800 hover:text-white{% endif %}">
                    <i class="fa-solid fa-star w-5 text-center"></i>
                    <span>Rating & Ulasan</span>
                </a>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-800">
            <form action="{{ url_for('admin_rt.logout') }}" method="POST">
                <button type="submit" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors w-full text-left">
                    <i class="fa-solid fa-arrow-right-from-bracket w-5 text-center"></i>
                    <span>Keluar</span>
                </button>
            </form>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 z-10 shrink-0">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-slate-500 hover:text-slate-700">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
            </div>
            <div class="flex items-center gap-4">
                 <div class="flex items-center gap-3 pl-4 border-l border-slate-200 cursor-pointer">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=0f766e&color=fff" alt="Profile" class="w-9 h-9 rounded-full object-cover border border-slate-200">
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-surface p-6">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-msg p-4 mb-4 rounded-lg text-sm font-medium {% if category == 'success' %}bg-emerald-100 text-emerald-800 border border-emerald-200{% else %}bg-red-100 text-red-800 border border-red-200{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        // Auto-hide flash messages setelah 5 detik
        setTimeout(function() {
            let alerts = document.querySelectorAll('.flash-msg');
            alerts.forEach(alert => {
                alert.style.transition = "opacity 0.5s ease";
                alert.style.opacity = "0";
                setTimeout(() => alert.remove(), 500);
            });
        }, 5000);
    </script>
</body>
</html>
